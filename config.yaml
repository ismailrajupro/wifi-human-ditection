mode: rssi              # rssi | csi | auto
interface: wifi         # network interface name (auto-detect if empty)

rssi:
  sample_interval: 0.2  # seconds between samples
  window_size: 30       # samples in sliding window
  z_threshold: 2.5      # z-score threshold for detection
  baseline_samples: 100 # samples to calibrate baseline
  min_duration: 2.0     # seconds before state change confirmed

csi:
  port: COM3            # serial port for ESP32
  baud: 921600          # serial baud rate
  window_size: 50       # CSI frames in sliding window
  z_threshold: 3.0      # z-score threshold
  baseline_frames: 200  # frames to calibrate

logging:
  level: INFO           # DEBUG | INFO | WARNING | ERROR
  file: wifi_detect.log

visualization:
  enabled: true
  update_interval: 0.1  # seconds
  max_points: 300       # max points on live plot
